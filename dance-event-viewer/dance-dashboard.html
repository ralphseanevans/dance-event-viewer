<!DOCTYPE html>
<!--
  Dance Event Viewer — Review Dashboard (hosted, phone-friendly).
  ==============================================================
  This is the PUBLIC-HOSTED companion to the local Submission_Review.html.
  It is safe to host on GitHub Pages because it contains NO REVIEW_TOKEN:
  it authenticates with a separate DASHBOARD_PASSWORD (a Script Property on
  the Apps Script backend) that the visitor types once and the browser keeps
  in localStorage. The real REVIEW_TOKEN never leaves the server.

  Talks to the same Apps Script web app the public form posts to:
    - POST {action:"list", password}                 -> all submission rows
    - POST {action:"update", password, row_id, ...}  -> Approve / Deny / Hold / edit
    - POST {action:"delete", password, row_id}       -> guarded row-linked artifact removal

  Requires the current backend in Submission_AppsScript_Code.gs. The password/list
  path is live; the final New Version redeploy activates the latest delete support.

  Run-the-skills buttons are NOT here — they live in the Cowork artifact
  (they need to trigger Claude scheduled tasks, which a web page can't do).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070910">
<title>Dance Review Dashboard</title>
<style>
  :root {
    --bg: #070910; --panel: #0e1320; --panel-2: #131a29; --panel-3: #182235;
    --line: #26334a; --line-soft: #1d283b; --text: #f4f7fb; --muted: #91a0b8;
    --accent: #70e1bd; --accent-strong: #2ecb98; --accent-soft: rgba(112,225,189,.12);
    --danger: #ff758c; --danger-soft: rgba(255,117,140,.12); --warn: #f6c76e;
    --warn-soft: rgba(246,199,110,.12); --info: #78b8ff; --info-soft: rgba(120,184,255,.12);
    --shadow: 0 24px 70px rgba(0,0,0,.28); --radius-lg: 22px; --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    color: var(--text); font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 12% 0%, rgba(71,88,255,.15), transparent 32rem),
      radial-gradient(circle at 92% 8%, rgba(46,203,152,.11), transparent 30rem), var(--bg);
    padding: max(18px, env(safe-area-inset-top)) 18px max(42px, env(safe-area-inset-bottom));
    overflow-x: hidden; -webkit-text-size-adjust: 100%;
  }
  button, input { font: inherit; }
  button:focus-visible, input:focus-visible, summary:focus-visible, a:focus-visible { outline: 3px solid var(--info); outline-offset: 3px; }
  .wrap { width: min(1180px, 100%); margin: 0 auto; }
  .app-shell { display: grid; grid-template-columns: 250px minmax(0, 1fr); gap: 24px; align-items: start; }
  .sidebar { position: sticky; top: 18px; min-width: 0; }
  .brand { display: flex; gap: 12px; align-items: center; padding: 6px 8px 24px; }
  .brand-mark { width: 42px; height: 42px; display: grid; place-items: center; border-radius: 13px; color: #071510;
    font-weight: 900; background: linear-gradient(135deg, var(--accent), #8ac7ff); box-shadow: 0 12px 35px rgba(112,225,189,.24); }
  .brand h1 { margin: 0; font-size: 1rem; letter-spacing: -.01em; }
  .brand p { margin: 3px 0 0; color: var(--muted); font-size: .76rem; }
  .tabbar { display: flex; flex-direction: column; gap: 5px; padding: 8px; border: 1px solid var(--line-soft);
    background: rgba(14,19,32,.74); backdrop-filter: blur(18px); border-radius: 18px; box-shadow: var(--shadow); }
  .tab { width: 100%; min-height: 46px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    border: 0; border-radius: 12px; padding: 10px 12px; color: var(--muted); background: transparent; cursor: pointer; text-align: left; }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.045); }
  .tab.active { color: var(--text); background: linear-gradient(100deg, var(--accent-soft), rgba(120,184,255,.08)); box-shadow: inset 3px 0 var(--accent); }
  .tab .count { min-width: 27px; height: 25px; display: grid; place-items: center; padding: 0 7px; border-radius: 999px;
    color: var(--muted); background: rgba(255,255,255,.055); font-size: .75rem; font-weight: 800; }
  .tab.active .count { color: var(--accent); background: rgba(112,225,189,.13); }
  .sidebar-note { margin: 14px 10px 0; color: #66748b; font-size: .72rem; line-height: 1.45; }

  .workspace { min-width: 0; }
  .workspace-head { min-height: 116px; display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; padding: 8px 4px 22px; }
  .eyebrow { color: var(--accent); text-transform: uppercase; letter-spacing: .14em; font-size: .68rem; font-weight: 850; }
  .workspace-head h2 { margin: 7px 0 6px; font-size: clamp(1.6rem, 3vw, 2.3rem); letter-spacing: -.045em; }
  .workspace-head p { margin: 0; max-width: 620px; color: var(--muted); line-height: 1.5; font-size: .9rem; }
  .toolbar { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
  .status-line { color: var(--muted); font-size: .78rem; white-space: nowrap; }
  .status-line.error { color: var(--danger); }
  .refresh { min-height: 42px; border: 1px solid var(--line); border-radius: 12px; padding: 0 14px; color: var(--text);
    background: var(--panel-2); cursor: pointer; font-weight: 750; }
  .refresh:hover { border-color: #405374; background: var(--panel-3); }
  .cards { display: grid; gap: 16px; }
  .card { position: relative; overflow: visible; border: 1px solid var(--line-soft); border-radius: var(--radius-lg); padding: 20px;
    background: linear-gradient(145deg, rgba(19,26,41,.98), rgba(13,18,30,.98)); box-shadow: 0 14px 45px rgba(0,0,0,.18); }
  .card::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 3px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); background: var(--accent); opacity: .5; }
  .card.correction::before { background: var(--warn); opacity: 1; }
  .card-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .badges { display: flex; gap: 7px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; min-height: 27px; border-radius: 999px; padding: 4px 10px; font-size: .69rem; font-weight: 850; letter-spacing: .025em; }
  .badge.pending, .badge.pendingflyer { background: var(--warn-soft); color: var(--warn); }
  .badge.hold, .badge.pendingfix { background: var(--info-soft); color: var(--info); }
  .badge.approved { background: var(--accent-soft); color: var(--accent); }
  .badge.rejected, .badge.denied, .badge.failed, .badge.extractionfailed { background: var(--danger-soft); color: var(--danger); }
  .badge.published, .badge.publishednew, .badge.applied, .badge.aidrafted { background: rgba(142,164,255,.12); color: #aebdff; }
  .badge.archived { background: rgba(255,255,255,.07); color: #aab3c2; }
  .badge.deleted { background: var(--danger-soft); color: var(--danger); }
  .badge.kind { background: rgba(255,255,255,.05); color: #bdc7d7; }
  .meta { color: #718098; font-size: .73rem; }
  .state-note { display: flex; gap: 10px; align-items: flex-start; margin: 0 0 16px; padding: 12px 14px; border: 1px solid rgba(120,184,255,.18);
    border-radius: 12px; color: #b9d9ff; background: rgba(120,184,255,.07); font-size: .82rem; line-height: 1.45; }
  .state-note strong { color: var(--text); }
  .flyer-row { display: grid; grid-template-columns: 112px 1fr; gap: 14px; align-items: start; margin-bottom: 16px; }
  .flyer-thumb { width: 112px; height: 112px; object-fit: cover; border-radius: 13px; border: 1px solid var(--line); background: var(--panel); }
  .flyer-link { align-self: center; color: var(--accent); font-size: .84rem; font-weight: 750; text-decoration: none; }
  .submitted { margin-bottom: 14px; padding: 14px 15px; border: 1px solid var(--line-soft); border-radius: 14px; background: rgba(7,9,16,.46); font-size: .86rem; }
  .submitted .label { margin-bottom: 9px; color: var(--warn); font-size: .67rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 850; }
  .submitted .row { display: grid; grid-template-columns: 100px minmax(0,1fr); gap: 10px; padding: 4px 0; }
  .submitted .row .k { color: var(--muted); }
  .submitted .row .v { word-break: break-word; }
  .submitted .row .v a { color: var(--accent); }
  .submitted .note { margin-top: 9px; padding: 10px 12px; border-radius: 10px; background: rgba(0,0,0,.22); white-space: pre-wrap; line-height: 1.5; }
  details.edit, details.danger-zone { margin: 0 0 14px; border: 1px solid var(--line-soft); border-radius: 13px; background: rgba(255,255,255,.018); }
  details.edit > summary, details.danger-zone > summary { min-height: 44px; display: flex; align-items: center; padding: 0 13px; color: var(--muted); cursor: pointer; list-style: none; font-size: .8rem; font-weight: 750; }
  details.edit > summary::-webkit-details-marker, details.danger-zone > summary::-webkit-details-marker { display: none; }
  details.edit > summary::before, details.danger-zone > summary::before { content: "+"; width: 22px; color: var(--accent); font-size: 1rem; }
  details.edit[open] > summary::before, details.danger-zone[open] > summary::before { content: "−"; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; padding: 0 13px 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { color: var(--muted); font-size: .65rem; text-transform: uppercase; letter-spacing: .07em; }
  .field input { width: 100%; min-height: 42px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; color: var(--text); background: var(--bg); }
  .contact-block { margin-bottom: 14px; padding: 11px 13px; border: 1px solid rgba(112,225,189,.15); border-radius: 11px; color: #d1d8e3; background: rgba(112,225,189,.045); font-size: .8rem; }
  .contact-block .label { margin-bottom: 4px; color: var(--accent); font-size: .64rem; text-transform: uppercase; letter-spacing: .08em; font-weight: 850; }
  .action-panel { padding-top: 16px; border-top: 1px solid var(--line-soft); }
  .action-label { margin-bottom: 10px; color: var(--muted); font-size: .73rem; line-height: 1.4; }
  .actions { display: flex; flex-wrap: wrap; gap: 9px; }
  button.act { min-height: 46px; padding: 0 16px; border: 1px solid var(--line); border-radius: 12px; color: var(--text); background: var(--panel-3); cursor: pointer; font-size: .85rem; font-weight: 800; }
  button.act:hover { transform: translateY(-1px); border-color: #476080; }
  button.act:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  button.act.primary, button.approve { color: #052018; border-color: var(--accent); background: linear-gradient(135deg, var(--accent), var(--accent-strong)); }
  button.deny { color: var(--danger); border-color: rgba(255,117,140,.3); background: var(--danger-soft); }
  button.hold { color: var(--info); border-color: rgba(120,184,255,.28); background: var(--info-soft); }
  button.ghost { color: #b2bdce; background: transparent; }
  button.act.confirming { color: #24070d; border-color: var(--danger); background: var(--danger); }
  .danger-zone { margin-top: 14px !important; border-color: rgba(255,117,140,.11) !important; }
  .danger-zone > summary { color: #8e6770 !important; }
  .danger-zone .actions { padding: 0 13px 13px; }
  .card-status { min-height: 1em; margin: 10px 0 0; color: var(--muted); font-size: .78rem; }
  .card-status.error { color: var(--danger); } .card-status.ok { color: var(--accent); }
  .empty { display: grid; place-items: center; min-height: 280px; margin: 0; border: 1px dashed var(--line); border-radius: var(--radius-lg); color: var(--muted); background: rgba(14,19,32,.5); text-align: center; }
  .manage-tools { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 12px; margin-bottom: 16px; padding: 16px;
    border: 1px solid var(--line-soft); border-radius: var(--radius-lg); background: rgba(14,19,32,.72); }
  .manage-search { min-height: 46px; width: 100%; padding: 10px 13px; border: 1px solid var(--line); border-radius: 12px; color: var(--text); background: var(--bg); }
  .manage-add { min-height: 46px; display: inline-flex; align-items: center; justify-content: center; padding: 0 16px; border-radius: 12px;
    border: 0; color: #052018; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); font-size: .85rem; font-weight: 850; cursor: pointer; }
  .manage-note { grid-column: 1 / -1; margin: 0; color: var(--muted); font-size: .78rem; line-height: 1.5; }
  .calendar-card h3 { margin: 0 0 7px; font-size: 1.05rem; }
  .calendar-card .calendar-meta { margin: 0 0 14px; color: var(--muted); font-size: .8rem; line-height: 1.5; }
  .calendar-card .calendar-key { display: block; margin-top: 5px; color: #687892; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: .68rem; word-break: break-all; }
  .manage-drawer-backdrop { position: fixed; z-index: 300; inset: 0; display: flex; justify-content: flex-end; background: rgba(0,0,0,.62); backdrop-filter: blur(4px); }
  .manage-drawer { width: min(580px, 92vw); height: 100%; display: flex; flex-direction: column; border-left: 1px solid var(--line); background: var(--panel); box-shadow: -24px 0 70px rgba(0,0,0,.42); }
  .manage-drawer-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 18px 20px; border-bottom: 1px solid var(--line-soft); }
  .manage-drawer-head h3 { margin: 0 0 5px; font-size: 1.2rem; }
  .manage-drawer-head p { margin: 0; color: var(--muted); font-size: .78rem; line-height: 1.45; }
  .drawer-close { min-width: 42px; min-height: 42px; border: 1px solid var(--line); border-radius: 11px; color: var(--text); background: var(--panel-2); cursor: pointer; }
  .manage-drawer-body { min-height: 0; flex: 1; overflow: auto; padding: 18px 20px 30px; }
  .manage-drawer iframe { width: 100%; height: 100%; min-height: 720px; border: 0; border-radius: 12px; background: #fff; }
  .manage-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .manage-edit-grid .field.wide { grid-column: 1 / -1; }
  .drawer-actions { display: flex; gap: 10px; margin-top: 18px; }
  .gate { max-width: 390px; margin: 12vh auto 0; padding: 28px; border: 1px solid var(--line); border-radius: 22px; background: var(--panel); box-shadow: var(--shadow); text-align: center; }
  .gate h2 { margin: 0 0 7px; font-size: 1.3rem; } .gate p { margin: 0 0 18px; color: var(--muted); font-size: .86rem; }
  .gate input { width: 100%; min-height: 48px; margin-bottom: 10px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 11px; color: var(--text); background: var(--bg); }
  .gate button { width: 100%; min-height: 48px; border: 0; border-radius: 11px; color: #052018; background: var(--accent); font-weight: 850; cursor: pointer; }
  .gate .err { min-height: 1.1em; margin-top: 9px; color: var(--danger); font-size: .8rem; }
  [data-tooltip] { position: relative; }
  [data-tooltip]::after {
    content: attr(data-tooltip); position: absolute; z-index: 100; left: 50%; bottom: calc(100% + 10px); width: max-content;
    max-width: min(320px, 78vw); padding: 10px 12px; border: 1px solid #40506a; border-radius: 10px;
    color: #eef4ff; background: #101827; box-shadow: 0 14px 38px rgba(0,0,0,.42); font-size: .75rem;
    font-weight: 500; line-height: 1.45; letter-spacing: 0; text-align: left; text-transform: none; white-space: normal;
    opacity: 0; visibility: hidden; pointer-events: none; transform: translate(-50%, 5px); transition: opacity .14s ease, transform .14s ease, visibility .14s;
  }
  [data-tooltip]::before {
    content: ""; position: absolute; z-index: 101; left: 50%; bottom: calc(100% + 5px); width: 9px; height: 9px;
    border: solid #40506a; border-width: 0 1px 1px 0; background: #101827; opacity: 0; visibility: hidden;
    pointer-events: none; transform: translateX(-50%) rotate(45deg); transition: opacity .14s ease, visibility .14s;
  }
  [data-tooltip]:hover::after, [data-tooltip]:focus-visible::after, [data-tooltip]:hover::before, [data-tooltip]:focus-visible::before { opacity: 1; visibility: visible; }
  [data-tooltip]:hover::after, [data-tooltip]:focus-visible::after { transform: translate(-50%, 0); }
  .tab[data-tooltip]::after { left: 10px; bottom: auto; top: calc(100% + 8px); transform: translateY(-4px); }
  .tab[data-tooltip]::before { display: none; }
  .tab[data-tooltip]:hover::after, .tab[data-tooltip]:focus-visible::after { transform: translateY(0); }
  .badge[data-tooltip] { cursor: help; }
  .hidden { display: none !important; }
  @media (max-width: 820px) {
    body { padding-left: 12px; padding-right: 12px; }
    .app-shell { display: block; }
    .sidebar { position: static; }
    .brand { padding: 5px 3px 14px; }
    .brand-mark { width: 38px; height: 38px; }
    .sidebar-note { display: none; }
    .tabbar { position: sticky; top: 0; z-index: 20; flex-direction: row; overflow-x: auto; margin: 0 -12px; padding: 9px 12px; border-width: 1px 0; border-radius: 0; scrollbar-width: none; }
    .tabbar::-webkit-scrollbar { display: none; }
    .tab { width: auto; min-height: 42px; flex: 0 0 auto; padding: 8px 11px; }
    .tab.active { box-shadow: inset 0 -3px var(--accent); }
    [data-tooltip]::after { position: fixed; left: 12px; right: 12px; top: 78px; bottom: auto; width: auto; max-width: none; transform: translateY(-4px); }
    [data-tooltip]::before { display: none; }
    [data-tooltip]:hover::after, [data-tooltip]:focus-visible::after { transform: translateY(0); }
    .workspace { overflow-x: clip; }
    .workspace-head { min-height: 0; padding: 20px 2px 16px; align-items: flex-end; }
    .workspace-head h2 { font-size: 1.7rem; }
    .workspace-head p { font-size: .82rem; }
    .toolbar { flex-direction: column-reverse; align-items: flex-end; gap: 6px; }
    .card { padding: 15px; border-radius: 18px; }
  }
  @media (max-width: 520px) {
    .brand p { display: none; }
    .workspace-head { display: block; }
    .toolbar { margin-top: 14px; flex-direction: row; justify-content: space-between; align-items: center; }
    .grid { grid-template-columns: 1fr; }
    .flyer-row { grid-template-columns: 88px 1fr; }
    .flyer-thumb { width: 88px; height: 88px; }
    .submitted .row { grid-template-columns: 82px minmax(0,1fr); }
    .actions { display: grid; grid-template-columns: 1fr 1fr; }
    button.act { width: 100%; padding: 0 12px; }
    button.act.primary, button.act.full { grid-column: 1 / -1; }
    .meta { width: 100%; }
    .manage-tools { grid-template-columns: 1fr; }
    .manage-note { grid-column: auto; }
    .manage-drawer { width: 100vw; }
    .manage-drawer-head, .manage-drawer-body { padding-left: 14px; padding-right: 14px; }
    .manage-edit-grid { grid-template-columns: 1fr; }
    .manage-edit-grid .field.wide { grid-column: auto; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- Password gate -->
    <div id="gate" class="gate hidden">
      <h2>Dance Review Dashboard</h2>
      <p>Enter the dashboard password to load the queue.</p>
      <input id="gate-input" type="password" inputmode="text" autocomplete="current-password" placeholder="Password" />
      <button id="gate-btn">Unlock</button>
      <div id="gate-err" class="err"></div>
    </div>

    <!-- Dashboard -->
    <div id="app" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">DR</div>
          <div><h1>Dance Review</h1><p>Submission control room</p></div>
        </div>
        <nav class="tabbar" id="tabs" aria-label="Submission status"></nav>
        <p class="sidebar-note">Actions change with each status. Destructive controls stay tucked away until you intentionally open them.</p>
      </aside>
      <main class="workspace">
        <header class="workspace-head">
          <div>
            <div class="eyebrow">Review queue</div>
            <h2 id="view-title">Pending decisions</h2>
            <p id="view-description">New submissions waiting for a decision.</p>
          </div>
          <div class="toolbar">
            <span class="status-line" id="status-line"></span>
            <button class="refresh" id="refresh">↻ Refresh</button>
          </div>
        </header>
        <div class="cards" id="cards"></div>
      </main>
    </div>
  </div>

<script>
"use strict";

const ENDPOINT = "https://script.google.com/macros/s/AKfycbwtL7anIfkIv7XBkR7AwDKKc13DBPrEghmcEEZiURWR_NLZI3s8CdayU6VQzelK9VMn6w/exec";
const PW_KEY = "dosDashPw";

// Which raw statuses fall under each tab.
const TAB_DEFS = [
  { key: "manage", label: "Manage calendar", title: "Manage calendar listings", description: "Add events or request protected removal from the canonical calendar JSON.", statuses: [] },
  { key: "pending", label: "Pending", title: "Pending decisions", description: "Review new submissions, make corrections, then approve, hold, or deny.", statuses: ["pending", "pending-flyer", "fix-failed"] },
  { key: "hold", label: "On hold", title: "Held for later", description: "Items paused for more information or a second look.", statuses: ["hold"] },
  { key: "approved", label: "Approved", title: "Approved submissions", description: "Completed decisions. Reopen only when the approval needs to change.", statuses: ["approved"] },
  { key: "denied", label: "Denied", title: "Denied submissions", description: "Rejected items kept for reference. Reopen if the decision changes.", statuses: ["rejected", "denied"] },
  { key: "replaced", label: "Live updates", title: "Instantly replaced", description: "Trusted updates already published or queued outside the approval flow.", statuses: ["published", "published-new", "applied", "pending-fix"] },
  { key: "archived", label: "Archived", title: "Archived records", description: "Tidied-away live updates. Archiving never removes them from the site.", statuses: ["archived"] },
  { key: "deleted", label: "Deleted", title: "Deleted records", description: "Audit-only history. Deleted records have no further dashboard actions.", statuses: ["deleted"] },
  { key: "all", label: "All active", title: "All active submissions", description: "Every non-archived, non-deleted item with actions matched to its current status.", statuses: null },
];

const TAB_TOOLTIPS = {
  manage: "Browse the public calendar, open the existing Add Event page, or file a protected request to remove an event from canonical dance_events.json. Requests do not edit JSON directly.",
  pending: "New submissions and failed extractions that still need a decision. Review the details, correct anything needed, then Approve, Hold, or Deny.",
  hold: "Submissions intentionally paused for missing information or a later decision. Nothing is approved or published simply because it is on hold.",
  approved: "Submissions you approved. Approval records the decision in the Submissions Sheet; transferring an approved item into the canonical calendars remains a separate workflow.",
  denied: "Submissions you rejected. They stay here as history and can be reopened if the decision changes.",
  replaced: "Trusted-sender automation: published = a flyer replacement went live; published-new = a new event went to the temporary web overlay; applied = a text correction was completed; pending-fix = a correction is still waiting for the separate apply workflow.",
  archived: "Completed live-update records hidden from active views. Archiving does not remove anything from the live site.",
  deleted: "Audit history for records deleted through the dashboard. Any row-linked temporary overlay or uploaded logo was removed first; canonical calendar data is never deleted here.",
  all: "Every active record except Archived and Deleted. Each card keeps the actions appropriate to its own status.",
};

const STATUS_TOOLTIPS = {

  "fix-failed": "A correction attempt failed and needs manual review before anything else happens.",
  hold: "Paused without approval or denial.",
  approved: "You approved this submission. Canonical calendar transfer is still a separate step.",
  rejected: "You denied this submission; it remains as review history.",
  denied: "You denied this submission; it remains as review history.",
  published: "A trusted flyer or image update was published immediately to the live site.",
  "published-new": "A trusted new event was published immediately to the temporary web-events overlay, not directly into canonical calendar JSON.",
  applied: "A trusted text correction was already applied and is complete.",
  "pending-fix": "A trusted correction is queued but has not been applied yet. It still needs the separate interactive apply workflow.",

  deleted: "Terminal dashboard record retained for audit history.",

const ACTION_TOOLTIPS = {
  "Approve": "Approve this submission and save any edited fields. Approval does not directly edit canonical calendar JSON.",
  "Approve now": "Resolve the hold by approving this submission and saving any edited fields.",

  "Save edits": "Save field corrections without changing the current review status.",
  "Reopen for review": "Move this completed decision back to Pending so it can be reviewed again.",
  "Archive submission record": "Move this dashboard submission record to Archived. It does not remove an event from the website and does not change dance_events.json or wcs_events.json.",
  "Restore to live updates": "Unarchive this record and return it to Live updates. Nothing new is published by this action.",
  "Cancel queued fix": "Stop this pending correction and move the record to Denied. The correction will not be applied.",
  "Delete submission record": "Move this submission record to the Deleted tab. It may also remove a temporary web-events.json listing and a flyer/logo uploaded by this submission. It never changes dance_events.json or wcs_events.json.",
  "Request removal from calendar JSON": "File a correction request asking for this event to be removed from canonical dance_events.json. This button does not edit JSON immediately; the protected local workflow must back up, regenerate WCS, test, and publish the removal.",

// Editable event fields (shown in the collapsible "Edit details" section).
const EDITABLE_FIELDS = [
  { key: "name", label: "Event name" },
  { key: "style", label: "Style" },
  { key: "type", label: "Type" },
  { key: "day_of_week", label: "Day of week" },
  { key: "monthly_rule", label: "Monthly rule" },
  { key: "start_date", label: "Start date" },
  { key: "end_date", label: "End date" },
  { key: "start_time", label: "Start time" },
  { key: "end_time", label: "End time" },
  { key: "venue", label: "Venue" },
  { key: "organizer", label: "Organizer" },
  { key: "cost", label: "Cost" },
];

let allRows = [];
let calendarEvents = [];
let calendarLoaded = false;
let currentTab = "pending";
let password = localStorage.getItem(PW_KEY) || "";

function $(sel, root) { return (root || document).querySelector(sel); }

function setTooltip(el, text, accessibleName) {
  if (!el || !text) return el;
  el.dataset.tooltip = text;
  if (accessibleName) el.setAttribute("aria-label", accessibleName + ". " + text);
  return el;
}

function makeBadge(text, cls, tooltip) {
  const badge = document.createElement("span");
  badge.className = "badge " + cls;
  badge.textContent = text;
  badge.tabIndex = 0;
  setTooltip(badge, tooltip, text);
  return badge;
}

function driveFileId(url) {
  const m = /\/d\/([a-zA-Z0-9_-]+)/.exec(url || "");
  return m ? m[1] : null;
}
function fmtTimestamp(iso) {
  try { return new Date(iso).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }); }
  catch (e) { return iso || ""; }
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function statusClass(s) { return String(s || "").replace(/[^a-z]/gi, "").toLowerCase(); }

async function apiPost(payload) {
  const res = await fetch(ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ password: password }, payload)),
  });
  return res.json();
}

/* ---------- Password gate ---------- */
function showGate(errMsg) {
  $("#app").classList.add("hidden");
  $("#gate").classList.remove("hidden");
  $("#gate-err").textContent = errMsg || "";
  $("#gate-input").focus();
}
function hideGate() {
  $("#gate").classList.add("hidden");
  $("#app").classList.remove("hidden");
}
function submitGate() {
  const val = $("#gate-input").value.trim();
  if (!val) { $("#gate-err").textContent = "Enter the password."; return; }
  password = val;
  localStorage.setItem(PW_KEY, val);
  hideGate();
  loadRows();
}

/* ---------- Load + render ---------- */
async function loadRows() {
  const statusLine = $("#status-line");
  statusLine.textContent = "Loading…";
  statusLine.classList.remove("error");
  try {
    const data = await apiPost({ action: "list" });
    if (!data.ok) {
      if (/unauthorized/i.test(data.error || "")) {
        localStorage.removeItem(PW_KEY); password = "";
        showGate("That password didn't work. Try again.");
        return;
      }
      throw new Error(data.error || "unknown error");
    }
    allRows = data.rows || [];
    statusLine.textContent = "Updated " + new Date().toLocaleTimeString(undefined, { timeStyle: "short" });
    renderTabs();
    renderCards();
  } catch (err) {
    statusLine.textContent = "Couldn't load: " + err.message;
    statusLine.classList.add("error");
  }
}

function rowsForTab(key) {
  if (key === "manage") return [];
  const def = TAB_DEFS.find(t => t.key === key);
  if (!def) return allRows.slice();
  // "All posts" shows every submission except archived/deleted ones (those live in their own tabs).
  if (def.statuses === null) return allRows.filter(r => r.status !== "archived" && r.status !== "deleted");
  return allRows.filter(r => def.statuses.includes(r.status));
}

function renderTabs() {
  const el = $("#tabs");
  el.innerHTML = "";
  TAB_DEFS.forEach(def => {
    const count = def.key === "manage" ? (calendarLoaded ? calendarEvents.length : "JSON") : rowsForTab(def.key).length;
    const btn = document.createElement("button");
    btn.className = "tab" + (currentTab === def.key ? " active" : "");
    btn.innerHTML = escapeHtml(def.label) + `<span class="count">${count}</span>`;
    btn.setAttribute("aria-current", currentTab === def.key ? "page" : "false");
    setTooltip(btn, TAB_TOOLTIPS[def.key]);
    btn.addEventListener("click", () => {
      currentTab = def.key;
      renderTabs();
      if (def.key === "manage" && !calendarLoaded) loadCalendarEvents();
      else renderCards();
    });
    el.appendChild(btn);
  });
}

function renderCards() {
  const cardsEl = $("#cards");
  cardsEl.innerHTML = "";
  const view = TAB_DEFS.find(t => t.key === currentTab) || TAB_DEFS[0];
  $("#view-title").textContent = view.title;
  $("#view-description").textContent = view.description;
  if (currentTab === "manage") {
    renderCalendarManager();
    return;
  }
  const rows = rowsForTab(currentTab);
  rows.sort((a, b) => String(b.timestamp || "").localeCompare(String(a.timestamp || "")));
  if (rows.length === 0) {
    cardsEl.innerHTML = `<p class="empty">Nothing in ${escapeHtml(view.label.toLowerCase())}.</p>`;
    return;
  }
  rows.forEach(row => cardsEl.appendChild(renderCard(row)));
}

async function loadCalendarEvents() {
  const cardsEl = $("#cards");
  cardsEl.innerHTML = `<p class="empty">Loading canonical calendar listings…</p>`;
  try {
    const res = await fetch("../dance_events.json?dashboard=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("calendar returned HTTP " + res.status);
    const data = await res.json();
    const events = Array.isArray(data) ? data : (data && Array.isArray(data.events) ? data.events : null);
    if (!events) throw new Error("calendar JSON does not contain an event list");
    calendarEvents = events.filter(event => event && event.key && event.name);
    calendarLoaded = true;
    renderTabs();
    renderCalendarManager();
  } catch (err) {
    cardsEl.innerHTML = `<p class="empty">Could not load the calendar: ${escapeHtml(err.message)}</p>`;
  }
}

function renderCalendarManager() {
  const cardsEl = $("#cards");
  $("#view-title").textContent = "Manage calendar listings";
  $("#view-description").textContent = "Add events or file protected exact-key edit and removal requests without leaving this tab.";
  cardsEl.innerHTML = "";
  const tools = document.createElement("div");
  tools.className = "manage-tools";
  const search = document.createElement("input");
  search.className = "manage-search";
  search.type = "search";
  search.placeholder = "Search event name, venue, style, or key";
  search.setAttribute("aria-label", "Search calendar listings");
  setTooltip(search, "Filter the calendar listings shown below. Searching does not change any event data.");
  const add = document.createElement("button");
  add.className = "manage-add";
  add.type = "button";
  add.textContent = "Add a new event";
  setTooltip(add, "Open the complete Add Event form inside this dashboard tab. Submitting uses the existing intake workflow; it does not directly edit canonical JSON.");
  add.addEventListener("click", openAddPanel);
  const note = document.createElement("p");
  note.className = "manage-note";
  note.textContent = "Removal buttons create protected correction requests. They do not directly edit dance_events.json or wcs_events.json. Canonical removal happens later through backup, WCS regeneration, validation, tests, and publish.";
  tools.appendChild(search); tools.appendChild(add); tools.appendChild(note);
  cardsEl.appendChild(tools);
  const list = document.createElement("div");
  list.className = "cards";
  cardsEl.appendChild(list);

  function draw() {
    const q = search.value.trim().toLowerCase();
    const shown = calendarEvents.filter(event => !q || [event.name, event.venue, event.style, event.key].some(value => String(value || "").toLowerCase().includes(q)));
    list.innerHTML = "";
    if (!shown.length) {
      list.innerHTML = `<p class="empty">No calendar listings match that search.</p>`;
      return;
    }
    shown.sort((a, b) => String(a.name).localeCompare(String(b.name)));
    shown.forEach(event => list.appendChild(renderCalendarCard(event)));
  }
  search.addEventListener("input", draw);
  draw();
}

function renderCalendarCard(event) {
  const card = document.createElement("article");
  card.className = "card calendar-card";
  const heading = document.createElement("h3");
  heading.textContent = event.name;
  const meta = document.createElement("p");
  meta.className = "calendar-meta";
  meta.textContent = [event.style, event.venue, event.start_date || event.day_of_week || event.monthly_rule].filter(Boolean).join(" · ");
  const key = document.createElement("span");
  key.className = "calendar-key";
  key.textContent = "JSON key: " + event.key;
  meta.appendChild(key);
  const actions = document.createElement("div");
  actions.className = "actions";
  const editBtn = mkBtn("Edit calendar entry", "act primary");
  const requestBtn = mkBtn("Request removal from calendar JSON", "act deny full");
  const status = document.createElement("p");
  status.className = "card-status";
  let armed = false;
  let timer = null;
  requestBtn.addEventListener("click", async () => {
    if (!armed) {
      armed = true;
      requestBtn.classList.add("confirming");
      requestBtn.textContent = "Confirm removal request";
      setTooltip(requestBtn, `Confirm a request to remove “${event.name}” (${event.key}) from canonical dance_events.json. This still does not edit JSON immediately.`);
      timer = setTimeout(() => {
        armed = false;
        requestBtn.classList.remove("confirming");
        requestBtn.textContent = "Request removal from calendar JSON";
        setTooltip(requestBtn, ACTION_TOOLTIPS["Request removal from calendar JSON"]);
      }, 6000);
      return;
    }
    clearTimeout(timer);
    requestBtn.disabled = true;
    status.textContent = "Filing protected removal request…";
    try {
      const data = await apiPost({
        action: "submit",
        submission_kind: "correction",
        intake_method: "dashboard-removal-request",
        event_key: event.key,
        source_note: `REMOVE FROM CANONICAL CALENDAR JSON. Dashboard request for “${event.name}” (${event.key}). Do not change the key. Apply only through the local backup → derive WCS → validate → atomic replace → test → publish workflow.`,
        contact_name: "Ralph (authenticated dashboard)",
      });
      if (!data.ok) throw new Error(data.error || "unknown error");
      status.textContent = "Removal request filed. The event remains in calendar JSON until the protected local workflow applies it.";
      status.classList.add("ok");
      requestBtn.textContent = "Removal request filed";
    } catch (err) {
      status.textContent = "Could not file request: " + err.message;
      status.classList.add("error");
      requestBtn.disabled = false;
      armed = false;
      requestBtn.classList.remove("confirming");
      requestBtn.textContent = "Request removal from calendar JSON";
    }
  });
  editBtn.addEventListener("click", () => openEditPanel(event));
  actions.appendChild(editBtn);
  actions.appendChild(requestBtn);
  card.appendChild(heading); card.appendChild(meta); card.appendChild(actions); card.appendChild(status);
  return card;
}

function openManageDrawer(title, description) {
  closeManageDrawer();
  const backdrop = document.createElement("div");
  backdrop.className = "manage-drawer-backdrop";
  backdrop.id = "manage-drawer-backdrop";
  const drawer = document.createElement("aside");
  drawer.className = "manage-drawer";
  drawer.setAttribute("role", "dialog");
  drawer.setAttribute("aria-modal", "true");
  drawer.setAttribute("aria-labelledby", "manage-drawer-title");
  const head = document.createElement("header");
  head.className = "manage-drawer-head";
  const copy = document.createElement("div");
  const heading = document.createElement("h3");
  heading.id = "manage-drawer-title";
  heading.textContent = title;
  const desc = document.createElement("p");
  desc.textContent = description;
  copy.appendChild(heading); copy.appendChild(desc);
  const close = document.createElement("button");
  close.className = "drawer-close";
  close.type = "button";
  close.textContent = "×";
  close.setAttribute("aria-label", "Close side panel");
  setTooltip(close, "Close this side panel without submitting a request.");
  const body = document.createElement("div");
  body.className = "manage-drawer-body";
  head.appendChild(copy); head.appendChild(close);
  drawer.appendChild(head); drawer.appendChild(body); backdrop.appendChild(drawer);
  document.body.appendChild(backdrop);
  close.addEventListener("click", closeManageDrawer);
  backdrop.addEventListener("click", event => { if (event.target === backdrop) closeManageDrawer(); });
  close.focus();
  return body;
}

function closeManageDrawer() {
  const existing = $("#manage-drawer-backdrop");
  if (existing) existing.remove();
}

function openAddPanel() {
  const body = openManageDrawer(
    "Add a new event",
    "Complete the same Add Event form used on the public site without leaving Manage calendar. This submits through intake; it does not directly edit canonical JSON."
  );
  const frame = document.createElement("iframe");
  frame.src = "submit-event.html?embedded=dashboard";
  frame.title = "Add a new event form";
  body.appendChild(frame);
}

function openEditPanel(event) {
  const body = openManageDrawer(
    "Edit calendar entry",
    `Editing “${event.name}” (${event.key}). Submitting files an exact-key correction request; canonical JSON is not changed immediately.`
  );
  const form = document.createElement("form");
  const grid = document.createElement("div");
  grid.className = "manage-edit-grid";
  const fields = {};
  EDITABLE_FIELDS.forEach(def => {
    const wrap = document.createElement("div");
    wrap.className = "field" + (["name", "venue"].includes(def.key) ? " wide" : "");
    const label = document.createElement("label");
    label.textContent = def.label;
    const input = document.createElement("input");
    input.type = "text";
    input.value = event[def.key] == null ? "" : event[def.key];
    input.name = def.key;
    wrap.appendChild(label); wrap.appendChild(input); grid.appendChild(wrap);
    fields[def.key] = input;
  });
  const explanation = document.createElement("p");
  explanation.className = "manage-note";
  explanation.textContent = "Only changed fields are included in the request. The event key is locked so its Calendar event and logo cannot be orphaned.";
  const actionRow = document.createElement("div");
  actionRow.className = "drawer-actions";
  const submit = mkBtn("Submit calendar edit request", "act primary full");
  submit.type = "submit";
  const status = document.createElement("p");
  status.className = "card-status";
  actionRow.appendChild(submit);
  form.appendChild(grid); form.appendChild(explanation); form.appendChild(actionRow); form.appendChild(status);
  body.appendChild(form);
  form.addEventListener("submit", async submitEvent => {
    submitEvent.preventDefault();
    const changed = {};
    EDITABLE_FIELDS.forEach(def => {
      const before = String(event[def.key] == null ? "" : event[def.key]);
      const after = fields[def.key].value.trim();
      if (after !== before) changed[def.key] = after;
    });
    if (!Object.keys(changed).length) {
      status.textContent = "Nothing changed, so no request was filed.";
      status.className = "card-status error";
      return;
    }
    submit.disabled = true;
    status.textContent = "Filing protected edit request…";
    status.className = "card-status";
    try {
      const summary = Object.keys(changed).map(key => `${key}: ${JSON.stringify(event[key] == null ? "" : event[key])} → ${JSON.stringify(changed[key])}`).join("\n");
      const data = await apiPost(Object.assign({
        action: "submit",
        submission_kind: "correction",
        intake_method: "dashboard-edit-request",
        event_key: event.key,
        source_note: `EDIT CANONICAL CALENDAR JSON ENTRY. Dashboard request for “${event.name}” (${event.key}). Preserve this exact key. Apply only through the local backup → derive WCS → validate → atomic replace → test → publish workflow.\n\nRequested field changes:\n${summary}`,
        contact_name: "Ralph (authenticated dashboard)",
      }, changed));
      if (!data.ok) throw new Error(data.error || "unknown error");
      status.textContent = "Edit request filed. The live calendar remains unchanged until the protected local workflow applies it.";
      status.className = "card-status ok";
      submit.textContent = "Edit request filed";
    } catch (err) {
      status.textContent = "Could not file edit request: " + err.message;
      status.className = "card-status error";
      submit.disabled = false;
    }
  });
}

function renderCard(row) {
  const isCorrection = String(row.submission_kind) === "correction";
  // Trusted-sender pipeline results: already live / already applied. "published" and
  // "published-new" went straight to the site; "applied" is an applied text fix.
  const isAutoApplied = ["published", "published-new", "applied"].includes(row.status);
  const isQueuedAuto = row.status === "pending-fix";
  const isArchived = row.status === "archived";
  const isDeleted = row.status === "deleted";

  const card = document.createElement("div");
  card.className = "card" + (isCorrection ? " correction" : "");

  // Head: badges + timestamp
  const head = document.createElement("div");
  head.className = "card-head";
  const badges = document.createElement("div");
  badges.className = "badges";
  badges.appendChild(makeBadge(row.status || "?", statusClass(row.status), STATUS_TOOLTIPS[row.status] || "Backend status for this submission."));
  badges.appendChild(makeBadge(isCorrection ? "Wrong info? / Add info" : "New event", "kind",
    isCorrection ? "A correction submitted from the site's Wrong info / Add info form." : "A proposed new event submission, not a correction to an existing listing."));
  if (row.intake_method === "flyer" && row.extraction_status && !["none", ""].includes(row.extraction_status)) {
    const extractionText = row.extraction_status === "ai-drafted" ? "AI drafted" : "extraction failed";
    const extractionTip = row.extraction_status === "ai-drafted"
      ? "AI read the flyer and drafted the event fields. Review them carefully before approval."
      : "The flyer was saved, but AI could not confidently read its event details. Open the flyer and enter or verify the fields manually before approval.";
    badges.appendChild(makeBadge(extractionText, statusClass(row.extraction_status), extractionTip));
  }
  const meta = document.createElement("span");
  meta.className = "meta";
  meta.textContent = `${row.intake_method || "form"} · ${fmtTimestamp(row.timestamp)}`;
  head.appendChild(badges); head.appendChild(meta);
  card.appendChild(head);

  if (isAutoApplied) {
    const n = document.createElement("div");
    n.className = "state-note";
    n.innerHTML = row.status === "applied"
      ? "<span>✓</span><div><strong>Already applied.</strong> This trusted correction is live and needs no approval.</div>"
      : "<span>⚡</span><div><strong>Already published.</strong> This trusted submission is live and needs no approval.</div>";
    card.appendChild(n);
  } else if (isQueuedAuto) {
    const n = document.createElement("div");
    n.className = "state-note";
    n.innerHTML = "<span>◷</span><div><strong>Queued correction.</strong> It still needs to be applied outside this approval panel.</div>";
    card.appendChild(n);
  } else if (isArchived) {
    const n = document.createElement("div");
    n.className = "state-note";
    n.innerHTML = "<span>◇</span><div><strong>Archived, not removed.</strong> It stays live on the site and can be restored here.</div>";
    card.appendChild(n);
  } else if (isDeleted) {
    const n = document.createElement("div");
    n.className = "state-note";
    n.innerHTML = "<span>×</span><div><strong>Deleted record.</strong> Any row-linked live artifact was removed; this card remains for audit history.</div>";
    card.appendChild(n);
  }

  // Flyer
  if (row.flyer_url) {
    const fr = document.createElement("div");
    fr.className = "flyer-row";
    const fileId = driveFileId(row.flyer_url);
    const img = document.createElement("img");
    img.className = "flyer-thumb"; img.alt = "Flyer"; img.loading = "lazy";
    img.src = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w300` : "";
    img.onerror = () => { img.style.display = "none"; };
    const link = document.createElement("a");
    link.className = "flyer-link"; link.href = row.flyer_url; link.target = "_blank"; link.rel = "noopener noreferrer";
    link.textContent = "Open full-size flyer ↗";
    setTooltip(link, "Open the original uploaded flyer in Google Drive for a full-resolution manual review.");
    fr.appendChild(img); fr.appendChild(link);
    card.appendChild(fr);
  }

  // "What they submitted" — the info entered at Send time
  card.appendChild(renderSubmitted(row, isCorrection));

  // Only active review states expose editable fields. Completed decisions remain
  // read-only until deliberately reopened, so their buttons match their tab.
  const canReview = ["pending", "pending-flyer", "fix-failed", "hold"].includes(row.status);

  // Editable details (collapsible) — only where an edit would reach the site.
  const inputs = {};
  if (canReview) {
    const det = document.createElement("details");
    det.className = "edit";
    const sum = document.createElement("summary");
    sum.textContent = "Edit details";
    setTooltip(sum, "Open the fields drafted or submitted for this event. Changes are saved with Save edits, Approve, or Hold.");
    det.appendChild(sum);
    const grid = document.createElement("div");
    grid.className = "grid";
    EDITABLE_FIELDS.forEach(f => {
      const wrap = document.createElement("div");
      wrap.className = "field";
      const lab = document.createElement("label"); lab.textContent = f.label;
      const inp = document.createElement("input"); inp.type = "text"; inp.value = row[f.key] == null ? "" : row[f.key]; inp.dataset.key = f.key;
      wrap.appendChild(lab); wrap.appendChild(inp); grid.appendChild(wrap);
      inputs[f.key] = inp;
    });
    det.appendChild(grid);
    card.appendChild(det);
  }

  // Contact (internal only)
  if (row.contact_name || row.contact_email || row.contact_phone) {
    const c = document.createElement("div");
    c.className = "contact-block";
    const parts = [row.contact_name, row.contact_email, row.contact_phone].filter(Boolean).map(escapeHtml);
    c.innerHTML = `<div class="label">Contact (internal only)</div>${parts.join(" · ")}`;
    c.tabIndex = 0;
    setTooltip(c, "Private submitter contact information. It is shown only in this authenticated dashboard and must never be published.");
    card.appendChild(c);
  }

  // Contextual actions — never repeat the state the card is already in.
  const actionPanel = document.createElement("div");
  actionPanel.className = "action-panel";
  const actionLabel = document.createElement("div");
  actionLabel.className = "action-label";
  const actions = document.createElement("div");
  actions.className = "actions";
  const cardStatus = document.createElement("p");
  cardStatus.className = "card-status";

  function collectFields() {
    const f = {};
    Object.keys(inputs).forEach(k => { f[k] = inputs[k].value; });
    return f;
  }
  let actionBtns = [];
  async function doUpdate(status, includeFields) {
    actionBtns.forEach(b => b.disabled = true);
    cardStatus.textContent = "Saving…"; cardStatus.className = "card-status";
    try {
      const payload = { action: "update", row_id: row.row_id };
      if (includeFields) payload.fields = collectFields();
      if (status) payload.status = status;
      const data = await apiPost(payload);
      if (!data.ok) throw new Error(data.error || "unknown error");
      cardStatus.textContent = status ? "Marked " + labelFor(status) + "." : "Saved.";
      cardStatus.classList.add("ok");
      await loadRows();
    } catch (err) {
      cardStatus.textContent = "Couldn't save: " + err.message;
      cardStatus.classList.add("error");
      actionBtns.forEach(b => b.disabled = false);
    }
  }

  if (isAutoApplied) {
    actionLabel.textContent = "This is already live. Archive it when you no longer need it in the active queue.";
    const archiveBtn = mkBtn("Archive submission record", "act ghost full");
    actionBtns = [archiveBtn];
    archiveBtn.addEventListener("click", () => doUpdate("archived", false));
    actions.appendChild(archiveBtn);
  } else if (isQueuedAuto) {
    actionLabel.textContent = "This fix is waiting for the separate apply workflow. You can only cancel it here.";
    const cancelBtn = mkBtn("Cancel queued fix", "act deny full");
    actionBtns = [cancelBtn];
    cancelBtn.addEventListener("click", () => doUpdate("rejected", false));
    actions.appendChild(cancelBtn);
  } else if (isArchived) {
    actionLabel.textContent = "Restore this record to Instantly Replaced. Its live site content is unchanged.";
    const restoreBtn = mkBtn("Restore to live updates", "act primary full");
    actionBtns = [restoreBtn];
    restoreBtn.addEventListener("click", () => doUpdate("published", false));
    actions.appendChild(restoreBtn);
  } else if (isDeleted) {
    actionLabel.textContent = "No actions are available for deleted records.";
  } else if (["pending", "pending-flyer", "fix-failed"].includes(row.status)) {
    actionLabel.textContent = "Make the decision for this submission. Edited fields are saved with Approve or Hold.";
    const approveBtn = mkBtn("Approve", "act approve");
    const denyBtn = mkBtn("Deny", "act deny");
    const holdBtn = mkBtn("Hold", "act hold");
    const saveBtn = mkBtn("Save edits", "act ghost");
    actionBtns = [approveBtn, denyBtn, holdBtn, saveBtn];
    actions.appendChild(approveBtn); actions.appendChild(denyBtn); actions.appendChild(holdBtn);
    actions.appendChild(saveBtn);
    approveBtn.addEventListener("click", () => doUpdate("approved", true));
    denyBtn.addEventListener("click", () => doUpdate("rejected", false));
    holdBtn.addEventListener("click", () => doUpdate("hold", true));
    saveBtn.addEventListener("click", () => doUpdate(null, true));
  } else if (row.status === "hold") {
    actionLabel.textContent = "Resolve the hold, return it to the review queue, or deny it.";
    const approveBtn = mkBtn("Approve now", "act approve");
    const returnBtn = mkBtn("Return to Pending", "act hold");
    const denyBtn = mkBtn("Deny", "act deny");
    const saveBtn = mkBtn("Save edits", "act ghost");
    actionBtns = [approveBtn, returnBtn, denyBtn, saveBtn];
    actions.appendChild(approveBtn); actions.appendChild(returnBtn); actions.appendChild(denyBtn); actions.appendChild(saveBtn);
    approveBtn.addEventListener("click", () => doUpdate("approved", true));
    returnBtn.addEventListener("click", () => doUpdate("pending", true));
    denyBtn.addEventListener("click", () => doUpdate("rejected", false));
    saveBtn.addEventListener("click", () => doUpdate(null, true));
  } else if (row.status === "approved") {
    actionLabel.textContent = "This decision is complete. Reopen it only if the approval needs to change.";
    const reopenBtn = mkBtn("Reopen for review", "act primary");
    const denyBtn = mkBtn("Change to Denied", "act deny");
    actionBtns = [reopenBtn, denyBtn];
    actions.appendChild(reopenBtn); actions.appendChild(denyBtn);
    reopenBtn.addEventListener("click", () => doUpdate("pending", false));
    denyBtn.addEventListener("click", () => doUpdate("rejected", false));
  } else if (["rejected", "denied"].includes(row.status)) {
    actionLabel.textContent = "This submission was denied. Reopen it only when the decision should be reconsidered.";
    const reopenBtn = mkBtn("Reopen for review", "act primary full");
    actionBtns = [reopenBtn];
    actions.appendChild(reopenBtn);
    reopenBtn.addEventListener("click", () => doUpdate("pending", false));
  }

  actionPanel.appendChild(actionLabel);
  if (actionBtns.length) actionPanel.appendChild(actions);
  card.appendChild(actionPanel);

  // Delete — on every live post (not on already-deleted rows). Two-tap confirm;
  // removes the event from the live site (if it was published there) and files
  // the row under Deleted.
  if (!isDeleted) {
    const danger = document.createElement("details");
    danger.className = "danger-zone";
    const dangerSummary = document.createElement("summary");
    dangerSummary.textContent = "Submission record actions";
    setTooltip(dangerSummary, "Contains the control that deletes this dashboard submission record and its row-linked temporary artifacts. It does not delete canonical calendar JSON.");
    danger.appendChild(dangerSummary);
    const delRow = document.createElement("div");
    delRow.className = "actions";
    const delBtn = mkBtn("Delete submission record", "act deny full");
    delRow.appendChild(delBtn);
    danger.appendChild(delRow);
    card.appendChild(danger);
    let armed = false, timer = null;
    async function doDelete() {
      delBtn.disabled = true;
      cardStatus.textContent = "Deleting…"; cardStatus.className = "card-status";
      try {
        const data = await apiPost({ action: "delete", row_id: row.row_id });
        if (!data.ok) throw new Error(data.error || "unknown error");
        cardStatus.textContent = data.removedFromSite
          ? "Submission record deleted. Its row-linked temporary site artifact was also removed. Canonical calendar JSON was not changed."
          : "Submission record deleted. No temporary site artifact existed. Canonical calendar JSON was not changed.";
        cardStatus.classList.add("ok");
        await loadRows();
      } catch (err) {
        cardStatus.textContent = "Couldn't delete: " + err.message;
        cardStatus.classList.add("error");
        delBtn.disabled = false;
      }
    }
    delBtn.addEventListener("click", () => {
      if (!armed) {
        armed = true;
        delBtn.classList.add("confirming");
        delBtn.textContent = "Confirm deletion of submission record";
        setTooltip(delBtn, "Second and final confirmation. This marks the Sheet row deleted and removes only temporary web overlay or uploaded-logo artifacts explicitly linked to this submission. Canonical calendar JSON is never deleted here.");
        timer = setTimeout(() => {
          armed = false;
          delBtn.classList.remove("confirming");
          delBtn.textContent = "Delete submission record";
          setTooltip(delBtn, ACTION_TOOLTIPS["Delete submission record"]);
        }, 4000);
        return;
      }
      clearTimeout(timer);
      doDelete();
    });
  }

  card.appendChild(cardStatus);

  return card;
}

function labelFor(status) {
  if (status === "rejected" || status === "denied") return "Denied";
  if (status === "hold") return "Hold";
  if (status === "approved") return "Approved";
  if (status === "pending") return "Pending";
  if (status === "archived") return "Archived";
  if (status === "deleted") return "Deleted";
  if (status === "published" || status === "published-new") return "restored to Instantly Replaced";
  return status;
}

function mkBtn(text, cls) {
  const b = document.createElement("button");
  b.className = cls; b.textContent = text;
  setTooltip(b, ACTION_TOOLTIPS[text]);
  return b;
}

/* The exact info the submitter entered when they hit Send. For corrections this
   is what came through the site's "Wrong info? / Need to add info?" widget. */
function renderSubmitted(row, isCorrection) {
  const box = document.createElement("div");
  box.className = "submitted";
  const rows = [];
  if (isCorrection && row.event_key) {
    rows.push(["Event", escapeHtml(row.name || row.event_key)]);
    rows.push(["Listing key", escapeHtml(row.event_key)]);
  } else {
    if (row.name) rows.push(["Event", escapeHtml(row.name)]);
    const sched = [row.day_of_week, row.monthly_rule, row.start_date, row.start_time && ("at " + row.start_time)].filter(Boolean).join(" · ");
    if (sched) rows.push(["When", escapeHtml(sched)]);
    if (row.venue) rows.push(["Venue", escapeHtml(row.venue)]);
    if (row.style) rows.push(["Style", escapeHtml(row.style) + (row.style_other ? " (" + escapeHtml(row.style_other) + ")" : "")]);
    if (row.cost) rows.push(["Cost", escapeHtml(row.cost)]);
  }
  if (row.source_url) rows.push(["Link", `<a href="${escapeHtml(row.source_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(row.source_url)}</a>`]);
  if (row.contact_name) rows.push(["From", escapeHtml(row.contact_name)]);

  let html = `<div class="label">${isCorrection ? "Submitted via “Wrong info? / Need to add info?”" : "What they submitted"}</div>`;
  rows.forEach(r => { html += `<div class="row"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`; });
  if (row.source_note) {
    html += `<div class="note">${escapeHtml(row.source_note)}</div>`;
  } else if (isCorrection) {
    html += `<div class="note" style="color:var(--text-dim)">(No message typed — see flyer / fields above.)</div>`;
  }
  box.innerHTML = html;
  return box;
}

/* ---------- Boot ---------- */
setTooltip($("#gate-btn"), "Check the dashboard password and load the private submission queue. The password is stored only in this browser's local storage for future visits.");
setTooltip($("#refresh"), "Reload every submission from the Apps Script backend and update all status counts. This does not change any records.");
setTooltip($("#gate-input"), "Enter the separate DASHBOARD_PASSWORD. This public page never contains or requests the master REVIEW_TOKEN.");
document.addEventListener("keydown", event => { if (event.key === "Escape") closeManageDrawer(); });
$("#gate-btn").addEventListener("click", submitGate);
$("#gate-input").addEventListener("keydown", e => { if (e.key === "Enter") submitGate(); });
$("#refresh").addEventListener("click", loadRows);

if (password) { hideGate(); loadRows(); } else { showGate(); }
</script>
