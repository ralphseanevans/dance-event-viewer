<!DOCTYPE html>
<!--
  Dance Event Viewer — "Submit an Event" placeholder.
  The real intake form isn't built yet (spec: Event_Submission_Form_Prompt.md
  in the Daily Operating System project folder). This page exists so the
  "Submit an Event" button on index.html has somewhere to land instead of 404ing.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Submit an Event — Coming Soon | Dance Event Viewer</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .construction-wrap {
      max-width: var(--maxw);
      margin: 20vh auto 0;
      padding: 40px 24px;
      text-align: center;
    }
    .construction-emoji { font-size: 2.6rem; line-height: 1; margin-bottom: 14px; }
    .construction-wrap h1 {
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: .02em;
    }
    .construction-wrap p {
      color: var(--text-dim);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto 24px;
    }
    .construction-back {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: .92rem;
    }
    .construction-back:hover { border-color: var(--accent); }
    .construction-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="construction-wrap">
    <div class="construction-emoji" aria-hidden="true">🚧👷🚧</div>
    <h1>Under Construction</h1>
    <p>You will soon be able to submit an event various ways!!</p>
    <a class="construction-back" href="index.html">&larr; Back to the Dance Event Viewer</a>
  </div>
</body>
</html>
